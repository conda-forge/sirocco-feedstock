schema_version: 1

context:
  name: sirocco
  version: 2.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/miguelmarco/SIROCCO2/releases/download/${{ version }}/libsirocco-${{ version }}.tar.gz
  sha256: e86c9fe3b1f2cf0d3a7381d21c1fc4670f14b538c60c7cc6410ccb0f5b1fbaf8

build:
  number: 2
  skip: win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - make
    - if: unix
      then: gnuconfig
  host:
    - gmp
    - mpfr
  run_exports:
    - ${{ pin_subpackage("sirocco") }}

tests:
  - script:
      - test -f $PREFIX/include/sirocco.h
      - test -f $PREFIX/lib/libsirocco${SHLIB_EXT}

about:
  license: GPL-3.0-only
  license_file: LICENSE
  summary: sirocco port to C++ and MPFR
  description: This is a library for computing homotopy continuation ...
  homepage: https://github.com/miguelmarco/SIROCCO2
  repository: https://github.com/miguelmarco/libbraiding

extra:
  recipe-maintainers:
    - enriqueartal
    - isuruf
    - saraedum

